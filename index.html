<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/jpeg" href="/logo.jpg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Preconnect to Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Load Google Fonts asynchronously to prevent render-blocking -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+Devanagari:wght@400;500;600;700&display=swap" media="print" onload="this.media='all'" />
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+Devanagari:wght@400;500;600;700&display=swap" />
    </noscript>
    <title>Divine Garbh Sanskar App</title>
  </head>
  <body>
    <div id="root">
      <style>
        .splash-screen {
          position: fixed;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          background: linear-gradient(135deg, #fff7ed 0%, #fff1f2 100%);
          display: flex;
          justify-content: center;
          align-items: center;
          z-index: 9999;
          font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        .splash-container {
          text-align: center;
          animation: fadeIn 0.8s ease-out;
        }
        .splash-logo {
          font-size: 72px;
          margin-bottom: 20px;
          display: inline-block;
          animation: pulse 2s infinite ease-in-out;
        }
        .splash-title {
          font-size: 24px;
          font-weight: 800;
          color: #ea580c;
          margin: 0 0 8px 0;
          letter-spacing: 0.5px;
        }
        .splash-subtitle {
          font-size: 13px;
          color: #fb7185;
          font-weight: 600;
          text-transform: uppercase;
          letter-spacing: 1.5px;
          margin: 0 0 32px 0;
        }
        .splash-loader {
          display: flex;
          justify-content: center;
          gap: 6px;
        }
        .splash-dot {
          width: 8px;
          height: 8px;
          background-color: #f43f5e;
          border-radius: 50%;
          animation: bounce 1.4s infinite ease-in-out both;
        }
        .splash-dot:nth-child(1) { animation-delay: -0.32s; }
        .splash-dot:nth-child(2) { animation-delay: -0.16s; }
        
        @keyframes fadeIn {
          from { opacity: 0; transform: translateY(10px); }
          to { opacity: 1; transform: translateY(0); }
        }
        @keyframes pulse {
          0%, 100% { transform: scale(1); }
          50% { transform: scale(1.05); }
        }
        @keyframes bounce {
          0%, 80%, 100% { transform: scale(0); }
          40% { transform: scale(1); }
        }
      </style>
      <div class="splash-screen">
        <div class="splash-container">
          <div class="splash-logo">🤰</div>
          <div class="splash-title">Divine Garbh Sanskar</div>
          <div class="splash-subtitle">Conscious Pregnancy Journey</div>
          <div class="splash-loader">
            <div class="splash-dot"></div>
            <div class="splash-dot"></div>
            <div class="splash-dot"></div>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
